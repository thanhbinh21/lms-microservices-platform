x-service-defaults: &service-defaults
  restart: unless-stopped
  build:
    context: .
    dockerfile: Dockerfile.service
  environment: &service-environment
    NODE_ENV: production
    LOG_LEVEL: ${LOG_LEVEL:-info}
    KAFKA_BROKER: kafka:29092
    INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?Set INTERNAL_SERVICE_SECRET in .env.production}
    CORS_ORIGIN: ${APP_ORIGIN:?Set APP_ORIGIN in .env.production}
    INTERNAL_HTTP_TIMEOUT_MS: ${INTERNAL_HTTP_TIMEOUT_MS:-2000}
  networks: [default]

services:
  zookeeper:
    ports: !reset []

  kafka:
    ports: !reset []
    environment:
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10

  kong:
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_ADMIN_LISTEN: 127.0.0.1:8001
    ports: !override
      - "127.0.0.1:8000:8000"
    volumes: !override
      - ./kong.production.yml:/kong/declarative/kong.yml:ro

  auth-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args: { SERVICE_FILTER: "@lms/auth-service" }
    env_file: ${AUTH_ENV_FILE:-./services/auth-service/.env}
    environment:
      <<: *service-environment
      JWT_SECRET: ${KONG_JWT_SECRET:?Set KONG_JWT_SECRET in .env.production}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL in .env.production}
      MEDIA_SERVICE_URL: http://media-service:3004
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3101/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3

  course-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args: { SERVICE_FILTER: "@lms/course-service" }
    env_file: ${COURSE_ENV_FILE:-./services/course-service/.env}
    environment:
      <<: *service-environment
      AUTH_SERVICE_URL: http://auth-service:3101
      LEARNING_SERVICE_URL: http://learning-service:3006
      CACHE_REDIS_URL: ${CACHE_REDIS_URL:?Set CACHE_REDIS_URL in .env.production}
      FAULT_INJECTION_ENABLED: ${FAULT_INJECTION_ENABLED:-false}
      COURSE_FAULT_DELAY_MS: ${COURSE_FAULT_DELAY_MS:-0}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3

  payment-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args: { SERVICE_FILTER: "@lms/payment-service" }
    env_file: ${PAYMENT_ENV_FILE:-./services/payment-service/.env}
    environment:
      <<: *service-environment
      COURSE_SERVICE_URL: http://course-service:3002
      AUTH_SERVICE_URL: http://auth-service:3101
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
      COURSE_CIRCUIT_FAILURE_THRESHOLD: ${COURSE_CIRCUIT_FAILURE_THRESHOLD:-3}
      COURSE_CIRCUIT_RESET_MS: ${COURSE_CIRCUIT_RESET_MS:-10000}
      VNPAY_RETURN_URL: ${APP_ORIGIN:?Set APP_ORIGIN in .env.production}/payment/vnpay-return
      VNPAY_IPN_URL: ${PUBLIC_GATEWAY_URL:?Set PUBLIC_GATEWAY_URL in .env.production}/payment/api/vnpay-ipn
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3

  media-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args: { SERVICE_FILTER: "@lms/media-service" }
    env_file: ${MEDIA_ENV_FILE:-./services/media-service/.env}
    environment:
      <<: *service-environment
      CACHE_REDIS_URL: ${CACHE_REDIS_URL:?Set CACHE_REDIS_URL in .env.production}
      MEDIA_PUBLIC_BASE_URL: ${PUBLIC_GATEWAY_URL:?Set PUBLIC_GATEWAY_URL in .env.production}/media
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3

  notification-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args: { SERVICE_FILTER: "@lms/notification-service" }
    env_file: ${NOTIFICATION_ENV_FILE:-./services/notification-service/.env}
    environment:
      <<: *service-environment
      AUTH_SERVICE_URL: http://auth-service:3101
      DEMO_NOTIFICATION_FAIL_ATTEMPTS: ${DEMO_NOTIFICATION_FAIL_ATTEMPTS:-0}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3

  learning-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args: { SERVICE_FILTER: "@lms/learning-service" }
    env_file: ${LEARNING_ENV_FILE:-./services/learning-service/.env}
    environment:
      <<: *service-environment
      COURSE_SERVICE_URL: http://course-service:3002
      AI_SERVICE_URL: http://ai-service:3008
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3006/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3

  community-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args: { SERVICE_FILTER: "@lms/community-service" }
    env_file: ${COMMUNITY_ENV_FILE:-./services/community-service/.env}
    environment:
      <<: *service-environment
      COURSE_SERVICE_URL: http://course-service:3002
      LEARNING_SERVICE_URL: http://learning-service:3006
      AUTH_SERVICE_URL: http://auth-service:3101
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3007/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3

  ai-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args: { SERVICE_FILTER: "@lms/ai-service" }
    env_file: ${AI_ENV_FILE:-./services/ai-service/.env}
    environment:
      <<: *service-environment
      COURSE_SERVICE_URL: http://course-service:3002
      LEARNING_SERVICE_URL: http://learning-service:3006
      AUTH_SERVICE_URL: http://auth-service:3101
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL in .env.production}
      CACHE_REDIS_URL: ${CACHE_REDIS_URL:?Set CACHE_REDIS_URL in .env.production}
      OPENROUTER_APP_URL: ${APP_ORIGIN:?Set APP_ORIGIN in .env.production}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3008/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3

  web-client:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_FILTER: web-client
        NEXT_PUBLIC_GATEWAY_URL: ${PUBLIC_GATEWAY_URL:?Set PUBLIC_GATEWAY_URL in .env.production}
    environment:
      NODE_ENV: production
      GATEWAY_URL: http://kong:8000
      NEXT_PUBLIC_GATEWAY_URL: ${PUBLIC_GATEWAY_URL:?Set PUBLIC_GATEWAY_URL in .env.production}
    ports: ["127.0.0.1:3000:3000"]
