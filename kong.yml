_format_version: "3.0"
_transform: true

# Services - Microservices Backend
services:
  - name: auth-service
    url: http://host.docker.internal:3101
    routes:
      - name: auth-route
        paths:
          - /auth
        strip_path: true
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
      # Route /instructor merge tu instructor-service (Phase 1 refactor)
      - name: instructor-request-route
        paths:
          - /instructor
        strip_path: true
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
      - name: request-transformer
        config:
          add:
            headers:
              - "x-user-id:$(headers['x-user-id'])"
              - "x-user-role:$(headers['x-user-role'])"
      - name: correlation-id
        config:
          header_name: x-trace-id
          generator: uuid
          echo_downstream: true

  - name: course-service
    url: http://host.docker.internal:3002
    routes:
      - name: course-route
        paths:
          - /course
        strip_path: true
