# Global Plugins
plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - x-trace-id
        - x-user-id
        - x-user-role
      exposed_headers:
        - x-trace-id
      credentials: true
      max_age: 3600

