                  kong.service.request.set_header("x-user-id", payload.userId or payload.user_id or "")
                  kong.service.request.set_header("x-user-role", payload.role or payload.user_role or "")
                  kong.service.request.set_header("x-user-email", payload.email or payload.user_email or "")

      - name: course-public-route
        paths:
          - /course
        strip_path: true
        methods: [GET, OPTIONS]
        plugins:
          - name: rate-limiting
            config:
              minute: 100
              policy: local
          - name: request-transformer
            config:
              remove:
                headers:
                  - x-user-id
                  - x-user-role
                  - x-user-email
          - name: pre-function
            config:
              access:
                - |
                  local method = kong.request.get_method()
                  local path = kong.request.get_path()
                  if method == "GET" then
                    if path == "/course/health"
                      or path == "/course/api/categories"
                      or path == "/course/api/courses"
                      or path:match("^/course/api/courses/[^/]+$")
                      or path:match("^/course/api/courses/[^/]+/reviews$")
                      or path:match("^/course/api/courses/[^/]+/reviews/stats$")
                      or path == "/course/api/instructors"
                      or path:match("^/course/api/instructors/[^/]+$")
                      or path:match("^/course/api/instructors/[^/]+/courses$")
                    then
                      return
                    end
                  end
                  return kong.response.exit(401, { success = false, code = 401, message = "Unauthorized", data = nil, trace_id = kong.request.get_header("x-trace-id") or "" })

