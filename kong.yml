_format_version: "3.0"
_transform: true

# JWT consumer for access token verification (HS256)
consumers:
  - username: lms-access-consumer
  - username: lms-anonymous-consumer

jwt_secrets:
  - consumer: lms-access-consumer
    key: access
    algorithm: HS256
    secret: lms-dev-gateway-secret-2026-min-32chars

services:
  - name: auth-service
    url: http://host.docker.internal:3101
    routes:
      - name: auth-public-route
        paths:
          - /auth
        strip_path: true
        methods: [GET, POST, OPTIONS]
        plugins:
          - name: rate-limiting
            config:
              minute: 100
              policy: local
          - name: pre-function
            config:
              access:
                - |
                  local method = kong.request.get_method()
                  local path = kong.request.get_path()
                  if method == "POST" then
                    if path == "/auth/login"
                      or path == "/auth/register"
                      or path == "/auth/refresh"
                      or path == "/auth/logout"
                    then
                      return
                    end
                  elseif method == "GET" then
                    if path == "/auth/health" then
                      return
                    end
                  elseif method == "OPTIONS" then
                    return
                  end
                  return kong.response.exit(401, { success = false, code = 401, message = "Unauthorized", data = nil, trace_id = kong.request.get_header("x-trace-id") or "" })
          - name: request-transformer
            config:
              remove:
                headers:
                  - x-user-id
                  - x-user-role
                  - x-user-email

      - name: auth-protected-route
        paths:
          - /auth
        strip_path: true
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        headers:
          authorization:
            - "~*.+"
        plugins:
          - name: rate-limiting
            config:
              minute: 100
              policy: local
          - name: jwt
            config:
              key_claim_name: type
              claims_to_verify: [exp, nbf]
              run_on_preflight: false
              header_names: [authorization]
              uri_param_names: []
              cookie_names: []
          - name: request-transformer
            config:
              remove:
                headers:
                  - x-user-id
                  - x-user-role
                  - x-user-email
          - name: post-function
            config:
              access:
                - |
                  local jwt = kong.ctx.shared.authenticated_jwt_token
                  local payload = (jwt and jwt.payload) or (jwt and jwt.claims) or kong.ctx.shared.authenticated_jwt_claims or {}
                  kong.service.request.set_header("x-user-id", payload.userId or payload.user_id or "")
                  kong.service.request.set_header("x-user-role", payload.role or payload.user_role or "")
                  kong.service.request.set_header("x-user-email", payload.email or payload.user_email or "")

      - name: instructor-protected-route
        paths:
          - /instructor
        strip_path: true
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        headers:
          authorization:
            - "~*.+"
        plugins:
          - name: rate-limiting
            config:
              minute: 100
              policy: local
          - name: jwt
            config:
              key_claim_name: type
              claims_to_verify: [exp, nbf]
              run_on_preflight: false
              header_names: [authorization]
              uri_param_names: []
              cookie_names: []
          - name: request-transformer
            config:
              remove:
                headers:
                  - x-user-id
                  - x-user-role
                  - x-user-email
          - name: post-function
            config:
              access:
                - |
                  local jwt = kong.ctx.shared.authenticated_jwt_token
                  local payload = (jwt and jwt.payload) or (jwt and jwt.claims) or kong.ctx.shared.authenticated_jwt_claims or {}
                  kong.service.request.set_header("x-user-id", payload.userId or payload.user_id or "")
                  kong.service.request.set_header("x-user-role", payload.role or payload.user_role or "")
                  kong.service.request.set_header("x-user-email", payload.email or payload.user_email or "")

      - name: instructor-noauth-route
        paths:
          - /instructor
        strip_path: true
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        plugins:
          - name: request-transformer
            config:
              remove:
                headers:
                  - x-user-id
                  - x-user-role
                  - x-user-email
          - name: request-termination
            config:
              status_code: 401
              message: Unauthorized

