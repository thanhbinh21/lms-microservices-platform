plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
      methods: [GET, POST, PUT, DELETE, PATCH, OPTIONS]
      headers: [Accept, Authorization, Content-Type, x-trace-id]
      exposed_headers: [x-trace-id]
      credentials: true
      max_age: 3600

  - name: correlation-id
    config:
      header_name: x-trace-id
      generator: uuid
      echo_downstream: true





